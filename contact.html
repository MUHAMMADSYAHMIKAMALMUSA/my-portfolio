<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Syahmi's Portfolio</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="game.html">Interactive</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <div class="form-card">
            <h2>Contact Me</h2>
            <p class="form-desc">Please fill out the form below to contact me. All fields are required.</p>
            
            <form id="contactForm" action="#" method="POST" novalidate>
                
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                    <span class="error-msg" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter password">
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" name="dob">
                    <span class="error-msg" id="dobError"></span>
                </div>

                <div class="form-group">
                    <label>Gender:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                    <span class="error-msg" id="genderError"></span>
                </div>

                <div class="form-group">
                    <label for="userPhoto">Upload Profile Photo:</label>
                    <input type="file" id="userPhoto" name="userPhoto" accept="image/*">
                    <span class="error-msg" id="photoError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="terms" name="terms"> I agree to the terms and conditions.
                    </label>
                    <span class="error-msg" id="termsError"></span>
                </div>

                <button type="submit" class="btn submit-btn">Submit</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 All Rights Reserved | Designed by Muhammad Syahmi</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            // Menghentikan tindakan refresh asal browser
            e.preventDefault();
            
            // Mengambil data input untuk pengesahan ringkas
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const dob = document.getElementById('dob').value;
            const terms = document.getElementById('terms').checked;
            
            // Sekiranya semua ruangan asas telah diisi (Melewati validasi script.js kau)
            if(name && email && password && dob && terms) {
                alert('Thank you, ' + name + '! Your message has been sent successfully.');
                this.reset(); // Mengosongkan semula borang selepas berjaya
            } else {
                alert('Please fix the errors in the form before submitting.');
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
