<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Syahmi's Portfolio</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="game.html">Interactive</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <div class="form-card">
            <h2>Contact Me</h2>
            <p class="form-desc">Please fill out the form below to contact me. All fields are required.</p>
            
            <form id="contactForm" action="https://formspree.io/f/mdarzyab" method="POST" novalidate>
                
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                    <span class="error-msg" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter subject/message purpose">
                    <span class="error-msg" id="subjectError"></span>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" name="dob">
                    <span class="error-msg" id="dobError"></span>
                </div>

                <div class="form-group">
                    <label>Gender:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                    <span class="error-msg" id="genderError"></span>
                </div>

                <div class="form-group">
                    <label for="userPhoto">Profile Photo URL / Name:</label>
                    <input type="text" id="userPhoto" name="userPhoto" placeholder="e.g., profile.jpg or image link">
                    <span class="error-msg" id="photoError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="terms" name="terms"> I agree to the terms and conditions.
                    </label>
                    <span class="error-msg" id="termsError"></span>
                </div>

                <button type="submit" class="btn submit-btn">Submit</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 All Rights Reserved | Designed by Muhammad Syahmi</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
